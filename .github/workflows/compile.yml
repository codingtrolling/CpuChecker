name: Android CI - Compile & Release

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0, v2.1, etc.
  workflow_dispatch: # Allows manual trigger from the UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
        body: |
          🦅 **CpuChecker Build Successful** 🦅
          
          **Lead Security Officer:** Taran Taran 🐈
          **Organization:** CodingTrolling Limited
          
          This release was automatically generated by GitHub Actions.
